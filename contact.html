<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - SG PDF Suite</title>
    
    <!-- Custom SG Favicon generated via SVG -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2225%22 fill=%22%2342f8f5%22/><text x=%2250%22 y=%2268%22 font-family=%22Arial, sans-serif%22 font-size=%2245%22 font-weight=%22bold%22 fill=%22%230d0f14%22 text-anchor=%22middle%22>SG</text></svg>">
    
    <!-- Futuristic Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- Exact Same Variables & Theme Setup --- */
        :root {
            --bg-main: #0d0f14;
            --bg-nav: #1c222d;
            --bg-sidebar: #12151a;
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
            --accent-glow: #42f8f5;
            --glow-shadow: rgba(66, 248, 245, 0.6);
            --font-main: 'Orbitron', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: var(--font-main);
            overflow-x: hidden;
        }

        /* --- Typography & Utilities --- */
        .glow-text {
            color: var(--accent-glow);
            text-shadow: 0 0 10px var(--glow-shadow);
        }

        a {
            text-decoration: none;
            color: var(--text-secondary);
            transition: 0.3s ease;
        }

        /* --- Navbar --- */
        .navbar {
            background-color: var(--bg-nav);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-glow);
            box-shadow: 0 4px 15px var(--glow-shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { display: flex; align-items: center; }

        .logo-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 35px;
            height: 35px;
            background-color: var(--accent-glow);
            color: var(--bg-main);
            border-radius: 8px;
            font-weight: 900;
            margin-right: 12px;
            font-size: 1.1rem;
            text-shadow: none;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-glow);
            text-shadow: 0 0 8px var(--glow-shadow);
        }

        .nav-links { display: flex; gap: 20px; }
        .nav-links a { font-weight: 500; position: relative; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent-glow); }
        .nav-links a::after {
            content: ''; position: absolute; width: 0%; height: 2px;
            bottom: -5px; left: 0; background-color: var(--accent-glow);
            box-shadow: 0 0 8px var(--accent-glow); transition: 0.3s ease;
        }
        .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }

        .hamburger { display: none; flex-direction: column; cursor: pointer; gap: 5px; }
        .hamburger div { width: 25px; height: 3px; background-color: var(--accent-glow); box-shadow: 0 0 5px var(--glow-shadow); }

        /* --- Layout --- */
        .layout-wrapper { display: flex; min-height: calc(100vh - 150px); } /* Adjusted to keep footer at bottom */

        /* --- Sidebar --- */
        .sidebar {
            width: 260px; background-color: var(--bg-sidebar);
            border-right: 1px solid var(--accent-glow); box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            padding: 2rem 1rem; transition: 0.3s ease;
        }

        .sidebar h3 { margin-bottom: 1rem; color: var(--text-secondary); letter-spacing: 2px; }
        .sidebar ul { list-style: none; }
        .sidebar ul li {
            padding: 12px; margin-bottom: 8px; cursor: pointer; border-radius: 5px;
            transition: 0.3s ease; border-left: 3px solid transparent;
        }
        .sidebar ul li:hover, .sidebar ul li.active {
            background-color: rgba(66, 248, 245, 0.1); border-left: 3px solid var(--accent-glow);
            color: var(--accent-glow); text-shadow: 0 0 5px var(--glow-shadow);
        }

        /* --- Main Content (Centered Form Layout) --- */
        .main-content { 
            flex: 1; 
            padding: 2rem; 
            overflow-y: auto; 
            display: flex; 
            align-items: center; 
            justify-content: center; /* Centers the form perfectly on the screen */
        }

        .contact-container {
            width: 100%;
            max-width: 450px;
            background-color: var(--bg-sidebar);
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            text-align: center;
            position: relative;
        }

        .contact-container::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, var(--glow-shadow) 10%, transparent 60%);
            opacity: 0.05; z-index: 0; pointer-events: none;
        }

        .contact-container > * { position: relative; z-index: 1; }

        .contact-container h1 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 15px; /* 4 Boxes stacked in a row perfectly */
        }

        .contact-form input, .contact-form textarea {
            width: 100%;
            padding: 15px;
            background-color: var(--bg-nav);
            border: 1px solid #333;
            border-radius: 5px;
            color: var(--text-primary);
            font-family: sans-serif;
            font-size: 1rem;
            text-align: center; /* Centers the text inside the form boxes */
            outline: none;
            transition: 0.3s ease;
        }

        .contact-form textarea {
            resize: none;
            height: 120px;
        }

        .contact-form input:focus, .contact-form textarea:focus {
            border-color: var(--accent-glow);
            box-shadow: 0 0 10px var(--glow-shadow);
        }

        .btn-glow {
            background-color: var(--bg-sidebar);
            color: var(--text-primary);
            border: 2px solid var(--accent-glow);
            padding: 15px;
            font-size: 1.1rem;
            font-family: var(--font-main);
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(66, 248, 245, 0.2);
            width: 100%;
        }

        .btn-glow:hover {
            background-color: var(--accent-glow);
            color: var(--bg-sidebar);
            box-shadow: 0 0 20px var(--glow-shadow);
        }

        .contact-email-text {
            margin-top: 1.5rem;
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 500;
            letter-spacing: 1px;
        }

        .contact-email-text span {
            color: var(--accent-glow);
            text-shadow: 0 0 5px var(--glow-shadow);
        }

        /* --- Footer --- */
        footer {
            background-color: var(--bg-nav); border-top: 2px solid var(--accent-glow);
            padding: 2rem; text-align: center; box-shadow: 0 -4px 15px var(--glow-shadow);
        }
        .footer-content p { margin-bottom: 10px; }
        .footer-links { margin: 15px 0; line-height: 2; }
        .footer-links a { margin: 0 8px; font-size: 0.95rem; }
        .footer-links a:hover { color: var(--accent-glow); text-shadow: 0 0 5px var(--glow-shadow); }
        .footer-separator { color: #555; margin: 0 2px; }
        .footer-email {
            margin-top: 15px; color: var(--accent-glow); font-weight: 500;
            letter-spacing: 1px; font-size: 1.05rem; text-shadow: 0 0 8px var(--glow-shadow);
        }

        /* --- Responsive Media Queries --- */
        @media (max-width: 768px) {
            .hamburger { display: flex; }
            .nav-links { 
                display: none; flex-direction: column; position: absolute; 
                top: 70px; right: 0; background: var(--bg-nav); padding: 20px; 
                border-bottom: 2px solid var(--accent-glow); border-left: 2px solid var(--accent-glow); 
                border-radius: 0 0 0 10px; width: 200px;
            }
            .layout-wrapper { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--accent-glow); }
            .footer-separator { display: inline-block; }
            .contact-container { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- Top Navbar -->
    <header class="navbar">
        <div class="logo">
            <span class="logo-box">SG</span>
            <span class="logo-text">SG PDF Suite</span>
        </div>
        <nav class="nav-links" id="nav-links">
            <a href="index.html" onclick="closeMobileMenu();">Home</a>
            <a href="index.html#tools-section" onclick="closeMobileMenu();">Tools</a>
            <a href="about.html" onclick="closeMobileMenu();">About</a>
            <a href="contact.html" class="active" onclick="closeMobileMenu();">Contact</a>
        </nav>
        <div class="hamburger" id="hamburger" onclick="toggleMenu()">
            <div></div>
            <div></div>
            <div></div>
        </div>
    </header>

    <div class="layout-wrapper">
        <!-- Left Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-section">
                <h3>Navigation</h3>
                <ul id="sidebar-categories">
                    <li onclick="window.location.href='index.html'">🌐 Back to Tools</li>
                    <li onclick="window.location.href='index.html'">🔻 PDF Tools</li>
                    <li onclick="window.location.href='index.html'">🧰 Utility Tools</li>
                </ul>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Centered Contact Form Container -->
            <div class="contact-container">
                <h1 class="glow-text">Contact Us</h1>
                
                <form class="contact-form" onsubmit="event.preventDefault(); alert('Message feature will be connected soon!'); this.reset();">
                    <!-- Row 1: Name -->
                    <input type="text" placeholder="Name" required>
                    
                    <!-- Row 2: Email -->
                    <input type="email" placeholder="Email Address" required>
                    
                    <!-- Row 3: Message -->
                    <textarea placeholder="Message" required></textarea>
                    
                    <!-- Row 4: Send Button -->
                    <button type="submit" class="btn-glow">Send</button>
                </form>

                <!-- Under the 4 rows -->
                <div class="contact-email-text">
                    Email: <span>contact@sgpdf.in</span>
                </div>
            </div>
        </main>
    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <p>© 2026 SG PDF Suite. All Rights Reserved.</p>
            
            <!-- Horizontal Footer Tabs exactly matching GitHub files -->
            <div class="footer-links">
                <a href="privacy-policy.html">Privacy Policy</a> <span class="footer-separator">|</span>
                <a href="terms.html">Terms and Conditions</a> <span class="footer-separator">|</span>
                <a href="disclaimer.html">Disclaimer</a> <span class="footer-separator">|</span>
                <a href="sitemap.html">Sitemap</a> <span class="footer-separator">|</span>
                <a href="about.html">About</a> <span class="footer-separator">|</span>
                <a href="contact.html">Contact</a>
            </div>
            
            <!-- Email display -->
            <div class="footer-email">contact@sgpdf.in</div>
        </div>
    </footer>

    <script>
        // Mobile Menu Toggle Logic
        function toggleMenu() {
            const navLinks = document.getElementById('nav-links');
            if(navLinks.style.display === 'flex') {
                navLinks.style.display = 'none';
            } else {
                navLinks.style.display = 'flex';
            }
        }

        function closeMobileMenu() {
            if(window.innerWidth <= 768) {
                document.getElementById('nav-links').style.display = 'none';
            }
        }
    </script>
</body>
</html>
