<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PNG to PDF · Simple & Private</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- PDF Library -->
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  
  <style>
    * { font-family: 'Inter', sans-serif; }
    
    .dropzone-active {
      background-color: #eff6ff;
      border-color: #3b82f6;
    }
    
    .dark .dropzone-active {
      background-color: #1e3a8a20;
      border-color: #60a5fa;
    }
    
    /* Simple file tile */
    .file-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      margin-bottom: 8px;
      background: white;
    }
    
    .dark .file-item {
      background: #1f2937;
      border-color: #374151;
    }
    
    .file-thumb {
      width: 48px;
      height: 48px;
      background: #f3f4f6;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    
    .dark .file-thumb {
      background: #374151;
    }
    
    .file-info {
      flex: 1;
    }
    
    .file-name {
      font-weight: 500;
      margin-bottom: 4px;
    }
    
    .file-status {
      font-size: 12px;
      color: #6b7280;
    }
    
    .progress-bar {
      height: 4px;
      background: #e5e7eb;
      border-radius: 2px;
      margin-top: 6px;
      width: 100%;
    }
    
    .progress-fill {
      height: 100%;
      background: #3b82f6;
      border-radius: 2px;
      transition: width 0.3s;
    }
    
    .btn {
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      border: 1px solid #e5e7eb;
      background: white;
      cursor: pointer;
    }
    
    .dark .btn {
      background: #374151;
      border-color: #4b5563;
      color: white;
    }
    
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    
    .btn-primary {
      background: #3b82f6;
      color: white;
      border: none;
    }
    
    .btn-primary:hover {
      background: #2563eb;
    }
    
    .drag-handle {
      cursor: grab;
      color: #9ca3af;
      font-size: 20px;
      user-select: none;
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 p-6">
  <div class="max-w-6xl mx-auto">
    
    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-light">📄 PNG·PDF <span class="text-blue-600">bridge</span></h1>
      <button id="themeToggle" class="px-3 py-2 border rounded-lg dark:border-gray-700">🌓 Theme</button>
    </div>
    
    <!-- Privacy Notice -->
    <div class="bg-blue-50 dark:bg-blue-950/30 border border-blue-200 dark:border-blue-800 rounded-xl p-4 mb-6">
      <p class="text-sm text-blue-700 dark:text-blue-300">🔒 <strong>100% Private</strong> — Files never leave your device</p>
    </div>
    
    <!-- Main Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
      
      <!-- Settings Panel -->
      <div class="lg:col-span-1 bg-white dark:bg-gray-800 border dark:border-gray-700 rounded-xl p-4 h-fit">
        <h2 class="font-semibold mb-4">⚙️ PDF Settings</h2>
        <div class="space-y-3">
          <div>
            <label class="block text-sm mb-1">Page Size</label>
            <select id="pageSize" class="w-full p-2 border rounded dark:bg-gray-700 dark:border-gray-600">
              <option value="A4">A4</option>
              <option value="Letter">Letter</option>
              <option value="Legal">Legal</option>
              <option value="fit" selected>Fit to Image</option>
            </select>
          </div>
          
          <div>
            <label class="block text-sm mb-1">Orientation</label>
            <select id="orientation" class="w-full p-2 border rounded dark:bg-gray-700 dark:border-gray-600">
              <option value="auto">Auto</option>
            </select>
          </div>
          
          <div>
            <label class="block text-sm mb-1">Quality</label>
            <input type="range" id="quality" min="10" max="100" value="85" class="w-full">
          </div>
        </div>
      </div>
      
      <!-- Main Area -->
      <div class="lg:col-span-3">
        
        <!-- Drop Zone -->
        <div id="dropzone" class="border-3 border-dashed border-gray-300 dark:border-gray-700 rounded-xl p-8 text-center cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800 transition mb-4">
          <input type="file" id="fileInput" multiple accept=".png,image/png" class="hidden">
          <div class="text-5xl mb-2">📤</div>
          <h3 class="text-lg font-medium">Drop PNG files here</h3>
          <p class="text-sm text-gray-500">or click to browse</p>
          <p class="text-xs text-gray-400 mt-2">✓ PNG only · No size limit</p>
        </div>
        
        <!-- Toolbar -->
        <div class="flex justify-between items-center mb-4">
          <div class="flex gap-2">
            <button id="combineBtn" class="btn btn-primary">📑 Combine PDF (C)</button>
            <button id="clearBtn" class="btn">🗑️ Clear (X)</button>
          </div>
          <div class="text-sm bg-gray-100 dark:bg-gray-800 px-4 py-2 rounded-lg">
            <span id="fileCount">0 images</span> · <span id="totalSize">0 KB</span>
          </div>
        </div>
        
        <!-- File List Container -->
        <div id="fileListContainer">
          <!-- Empty State -->
          <div id="emptyState" class="text-center py-16 border-2 border-dashed border-gray-200 dark:border-gray-800 rounded-xl">
            <div class="text-5xl mb-3">🖼️</div>
            <p class="text-gray-500">No images added yet</p>
            <p class="text-sm text-gray-400 mt-1">Drop PNG files to get started</p>
          </div>
          
          <!-- File List (will be populated by JavaScript) -->
          <div id="fileList" class="space-y-2"></div>
        </div>
        
        <!-- Bottom Combine Button -->
        <div class="mt-4 text-right">
          <button id="combineBottomBtn" class="btn btn-primary">📥 Download Combined PDF</button>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    (function() {
      // Simple theme toggle
      document.getElementById('themeToggle').addEventListener('click', () => {
        document.documentElement.classList.toggle('dark');
      });
      
      // ===== APP STATE =====
      let files = [];
      let nextId = 1;
      
      // DOM elements
      const dropzone = document.getElementById('dropzone');
      const fileInput = document.getElementById('fileInput');
      const fileList = document.getElementById('fileList');
      const emptyState = document.getElementById('emptyState');
      const fileCount = document.getElementById('fileCount');
      const totalSize = document.getElementById('totalSize');
      const combineBtn = document.getElementById('combineBtn');
      const combineBottomBtn = document.getElementById('combineBottomBtn');
      const clearBtn = document.getElementById('clearBtn');
      
      // Helper: format bytes
      function formatBytes(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
      }
      
      // Update counters
      function updateStats() {
        fileCount.textContent = files.length + ' image' + (files.length !== 1 ? 's' : '');
        const total = files.reduce((sum, f) => sum + f.size, 0);
        totalSize.textContent = formatBytes(total);
      }
      
      // Move file up/down
      function moveFile(id, direction) {
        const index = files.findIndex(f => f.id === id);
        if (index === -1) return;
        
        const newIndex = index + direction;
        if (newIndex < 0 || newIndex >= files.length) return;
        
        [files[index], files[newIndex]] = [files[newIndex], files[index]];
        renderFileList();
      }
      
      // Download single PDF
      async function downloadSinglePDF(id) {
        const file = files.find(f => f.id === id);
        if (!file || file.status !== 'done') return;
        
        try {
          file.status = 'converting';
          renderFileList();
          
          const pdfDoc = await PDFLib.PDFDocument.create();
          const arrayBuffer = await file.file.arrayBuffer();
          const image = await pdfDoc.embedPng(arrayBuffer);
          
          const page = pdfDoc.addPage([image.width, image.height]);
          page.drawImage(image, { x: 0, y: 0, width: image.width, height: image.height });
          
          const pdfBytes = await pdfDoc.save();
          const blob = new Blob([pdfBytes], { type: 'application/pdf' });
          const url = URL.createObjectURL(blob);
          
          const a = document.createElement('a');
          a.href = url;
          a.download = file.name.replace(/\.png$/i, '.pdf');
          a.click();
          
          URL.revokeObjectURL(url);
          
          file.status = 'done';
        } catch (err) {
          file.status = 'error';
          file.error = 'Conversion failed';
        }
        
        renderFileList();
      }
      
      // Combine all PDFs
      async function combineAllPDFs() {
        const readyFiles = files.filter(f => f.status === 'done');
        if (readyFiles.length !== files.length || files.length === 0) {
          alert('Please wait for all files to be ready');
          return;
        }
        
        try {
          const pdfDoc = await PDFLib.PDFDocument.create();
          
          for (const file of files) {
            const arrayBuffer = await file.file.arrayBuffer();
            const image = await pdfDoc.embedPng(arrayBuffer);
            const page = pdfDoc.addPage([image.width, image.height]);
            page.drawImage(image, { x: 0, y: 0, width: image.width, height: image.height });
          }
          
          const pdfBytes = await pdfDoc.save();
          const blob = new Blob([pdfBytes], { type: 'application/pdf' });
          const url = URL.createObjectURL(blob);
          
          const a = document.createElement('a');
          a.href = url;
          a.download = 'combined.pdf';
          a.click();
          
          URL.revokeObjectURL(url);
        } catch (err) {
          alert('Error: ' + err.message);
        }
      }
      
      // Render file list
      function renderFileList() {
        if (files.length === 0) {
          emptyState.style.display = 'block';
          fileList.innerHTML = '';
        } else {
          emptyState.style.display = 'none';
          
          let html = '';
          files.forEach((f, index) => {
            const statusColor = {
              'queued': 'text-yellow-600',
              'converting': 'text-blue-600',
              'done': 'text-green-600',
              'error': 'text-red-600'
            }[f.status] || '';
            
            const statusIcon = {
              'queued': '⏳',
              'converting': '⚙️',
              'done': '✅',
              'error': '❌'
            }[f.status] || '📄';
            
            html += `
              <div class="file-item" data-id="${f.id}" draggable="true">
                <span class="drag-handle" draggable="false">⋮⋮</span>
                
                <div class="file-thumb">
                  ${f.thumbnail ? 
                    `<img src="${f.thumbnail}" class="w-full h-full object-cover">` : 
                    `<span class="text-2xl">📷</span>`
                  }
                </div>
                
                <div class="file-info">
                  <div class="file-name">${f.name}</div>
                  <div class="file-status ${statusColor}">
                    ${statusIcon} ${f.status} · ${formatBytes(f.size)}
                  </div>
                  
                  <div class="progress-bar">
                    <div class="progress-fill" style="width: ${f.progress}%"></div>
                  </div>
                  
                  ${f.error ? `<div class="text-xs text-red-500 mt-1">${f.error}</div>` : ''}
                </div>
                
                <div>
                  <button class="btn download-btn" data-id="${f.id}" ${f.status !== 'done' ? 'disabled' : ''}>
                    ⬇ PDF
                  </button>
                  <button class="btn up-btn" data-id="${f.id}" ${index === 0 ? 'disabled' : ''}>↑</button>
                  <button class="btn down-btn" data-id="${f.id}" ${index === files.length-1 ? 'disabled' : ''}>↓</button>
                </div>
              </div>
            `;
          });
          
          fileList.innerHTML = html;
          
          // Add event listeners
          document.querySelectorAll('.download-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
              e.stopPropagation();
              downloadSinglePDF(Number(btn.dataset.id));
            });
          });
          
          document.querySelectorAll('.up-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
              e.stopPropagation();
              moveFile(Number(btn.dataset.id), -1);
            });
          });
          
          document.querySelectorAll('.down-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
              e.stopPropagation();
              moveFile(Number(btn.dataset.id), 1);
            });
          });
          
          // Drag and drop reordering
          let draggedIndex = null;
          const items = document.querySelectorAll('.file-item');
          
          items.forEach(item => {
            item.addEventListener('dragstart', (e) => {
              draggedIndex = Array.from(fileList.children).indexOf(item);
              e.dataTransfer.setData('text/plain', item.dataset.id);
            });
            
            item.addEventListener('dragover', (e) => e.preventDefault());
            
            item.addEventListener('drop', (e) => {
              e.preventDefault();
              const target = e.target.closest('.file-item');
              if (!target) return;
              
              const targetIndex = Array.from(fileList.children).indexOf(target);
              if (draggedIndex === null || draggedIndex === targetIndex) return;
              
              const [moved] = files.splice(draggedIndex, 1);
              files.splice(targetIndex, 0, moved);
              renderFileList();
            });
          });
        }
        
        updateStats();
      }
      
      // Process uploaded files
      function handleFiles(selectedFiles) {
        const pngFiles = Array.from(selectedFiles).filter(f => 
          f.type === 'image/png' || f.name.toLowerCase().endsWith('.png')
        );
        
        if (pngFiles.length === 0) {
          alert('Please select PNG files');
          return;
        }
        
        // Add files to array
        pngFiles.forEach(file => {
          const id = nextId++;
          const fileObj = {
            id,
            file,
            name: file.name,
            size: file.size,
            status: 'queued',
            thumbnail: null,
            progress: 10,
            error: null
          };
          files.push(fileObj);
        });
        
        renderFileList();
        
        // Generate thumbnails
        pngFiles.forEach((file, idx) => {
          const fileObj = files[files.length - pngFiles.length + idx];
          
          const reader = new FileReader();
          reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement('canvas');
              canvas.width = 48;
              canvas.height = 48;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, 48, 48);
              
              fileObj.thumbnail = canvas.toDataURL('image/png');
              fileObj.status = 'done';
              fileObj.progress = 100;
              renderFileList();
            };
            img.src = e.target.result;
          };
          reader.readAsDataURL(file);
        });
      }
      
      // Event listeners
      dropzone.addEventListener('click', () => fileInput.click());
      
      dropzone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropzone.classList.add('dropzone-active');
      });
      
      dropzone.addEventListener('dragleave', () => {
        dropzone.classList.remove('dropzone-active');
      });
      
      dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropzone.classList.remove('dropzone-active');
        handleFiles(e.dataTransfer.files);
      });
      
      fileInput.addEventListener('change', (e) => {
        handleFiles(e.target.files);
        fileInput.value = '';
      });
      
      combineBtn.addEventListener('click', combineAllPDFs);
      combineBottomBtn.addEventListener('click', combineAllPDFs);
      
      clearBtn.addEventListener('click', () => {
        files = [];
        renderFileList();
      });
      
      // Keyboard shortcuts
      document.addEventListener('keydown', (e) => {
        if (e.ctrlKey || e.metaKey) return;
        const key = e.key.toLowerCase();
        if (key === 'u') {
          e.preventDefault();
          fileInput.click();
        } else if (key === 'c') {
          e.preventDefault();
          combineAllPDFs();
        } else if (key === 'x') {
          e.preventDefault();
          files = [];
          renderFileList();
        }
      });
      
      // Initial render
      renderFileList();
      
      // Add test files for debugging (remove in production)
      // This helps verify the UI works
      window.testAddFiles = function() {
        // Create mock file objects
        for (let i = 1; i <= 3; i++) {
          const id = nextId++;
          files.push({
            id,
            file: null,
            name: `test-image-${i}.png`,
            size: 1024 * 50,
            status: 'done',
            thumbnail: null,
            progress: 100,
            error: null
          });
        }
        renderFileList();
      };
      
      console.log('App ready - Call window.testAddFiles() to test UI');
    })();
  </script>
</body>
</html>
